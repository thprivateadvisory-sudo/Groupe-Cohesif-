<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentions légales — Groupe Cohesif</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --navy: #0b1c3d;
    --gold: #c9a84c;
    --ink: #1a2535;
    --ink2: #3d4f68;
    --off: #f8f7f5;
  }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--off);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--navy);
    padding: 1.2rem 2rem;
  }
  header a {
    color: var(--gold);
    text-decoration: none;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: .05em;
  }
  main {
    flex: 1;
    max-width: 720px;
    margin: 4rem auto;
    padding: 0 2rem;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--navy);
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 2px solid var(--gold);
  }
  h2 {
    font-size: 1rem;
    font-weight: 600;
    color: var(--navy);
    margin: 2rem 0 .5rem;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  p {
    color: var(--ink2);
    line-height: 1.8;
    font-size: .95rem;
  }
  footer {
    text-align: center;
    padding: 1.5rem;
    font-size: .8rem;
    color: var(--ink2);
    border-top: 1px solid rgba(11,28,61,.1);
  }
  footer a { color: var(--navy); text-decoration: none; }
</style>
</head>
<body>

<header>
  <a href="index.html">← Groupe Cohesif</a>
</header>

<main>
  <h1>Mentions légales</h1>

  <h2>Éditeur du site</h2>
  <p>
    Groupe Cohesif<br>
    200 rue de la Croix Nivert, Paris<br>
    SIRET : 889 287 462 00036
  </p>
</main>

<footer>
  <p>© 2025 Groupe Cohesif — <a href="index.html">Retour au site</a></p>
</footer>

</body>
</html>
